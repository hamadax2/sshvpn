name: Build Kivy APK Without Docker

on:
  push:
    branches: [ main ] # تأكد من مطابقة اسم فرعك الرئيسي (main أو master)
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Correct System Dependencies
      run: |
        sudo apt-get update
        # تثبيت الحزم بالأسماء الرسمية الصحيحة المتوافقة مع Ubuntu لبيئة Kivy و Buildozer
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
        libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
        libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-mixer-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade Cython==0.29.33 virtualenv buildozer

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kivy-App-APK
        path: bin/*.apk
